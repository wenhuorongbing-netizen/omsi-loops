      - generic [ref=e259]:
        - generic [ref=e260]: Action Log
        - list [ref=e261]:
          - listitem [ref=e262]: "Loop 0: You're a simple courier, on a long trip to deliver a high priority package. Just as you entered town, you tripped - breaking your glasses - and the package burst open, spilling a strange liquid on you. Immediately, your meager amount of mana started draining rapidly. Right as your mana completely ran out, you found yourself back in the moment the liquid was absorbed into your skin, with your tiny reserves filled... yet draining just as before. This happened again and again, the world resetting with you, until you decided you had to figure out a way to prolong how long these 'loops' were. Mana crystals are often stored in pottery around town, perhaps you'll start there ..."
          - listitem [ref=e555]: "Loop 7, Wander in Beginnersville (20% Explored): You know the general layout of the small village now, you don't get lost walking from one side to another!"
          - listitem [ref=e556]: "Loop 7, Wander in Beginnersville (40% Explored): You're starting to really know your way around, you can almost figure your way around without following a set path!"
          - listitem [ref=e557]: "Loop 7, Wander in Beginnersville (60% Explored): You've trod all the main roads and you avail yourself to the unkempt side paths and less well-worn paths. If you let yourself into some houses along the way, well, no one needs to know, do they?"
          - listitem [ref=e558]: "Loop 7, Wander in Beginnersville (80% Explored): You've decided to explore the houses now that you've trod every single feasible path in this small village. Man, the stuff people keep around."
          - listitem [ref=e559]: "Loop 7, Wander in Beginnersville (100% Explored): You've been everywhere, there is absolutely nowhere in this town you haven't been. You've been in every cellar, under every bed, and in every closet. You've pried all the floorboards, and just in general, been into everything. Except the houses with locks, those dastardly locks."
          - listitem [ref=e263]: End of log