    <div id="loadingBox" class="showWhileLoading hideWhenLoaded">

        <div id="loadingText" class="localized" data-lockey="misc>loading">初次加载（可能需要一点时间）...</div>
    </div>
    <canvas id="talentTreeCanvas" style="display: none;"></canvas>
    <div id="talentTree" style="display: none;"></div>
    <header id="timeInfo" style="width:100%;text-align:center;">
        <button id="cheat" class="button showthat control localized" style="display: none; margin-top: 5px;" onclick="cheat()" data-lockey="misc>cheat">作弊</button>
        <div id="commandDeck">
            <div id="timeBarContainer" style="width:100%;height:10px;background:var(--progress-bar-background);text-align:center;position:relative;">
                <div id="timeBar" style="height:100%;width:20%;background-color:var(--progress-bar-mana-color);display:block;margin:auto;"></div>
            </div>
            <div id="runStatusDeck">
                <div id="runVitals" aria-live="polite"></div>
                <div id='timeControls'></div>
            </div>
            <div id="resourceDeck">
                <div id='trackedResources'></div>
            </div>
            <details id="menuDeck">
                <summary id="menuDeckLabel"></summary>
                <menu id='menu' style='float: left; height: 30px; margin-left: 24px; margin-right: -24px;'></menu>
            </details>
        </div>
    </header>

    <main id="main">
        <div id="statsColumn">
            <div id="readingShell">
                <div id="readingTabs" class="readingTabs" role="tablist" aria-label="Reading Panels">
                    <button id="readingTabInspector" class="button readingTab is-active" type="button" onclick="view.setReadingPane('inspector')"></button>
                    <button id="readingTabChronicle" class="button readingTab" type="button" onclick="view.setReadingPane('chronicle')"></button>
                    <button id="readingTabCharacter" class="button readingTab" type="button" onclick="view.setReadingPane('character')"></button>
                </div>
                <section id="inspectorPane" class="readingPane" aria-live="polite">
                    <div id="inspectorEmpty" class="inspectorEmpty"></div>
                    <div id="inspectorContent" class="hidden">
                        <div id="inspectorHero">
                            <div id="inspectorHeader" class="readingPaneHeader"></div>
                            <div id="inspectorMeta" class="inspectorMeta"></div>
                            <div id="inspectorLead" class="inspectorLead hidden"></div>
                        </div>
                        <div id="inspectorTabs" class="readingSubTabs" role="tablist" aria-label="Inspector Tabs">
                            <button id="inspectorTabSummary" class="button readingSubTab is-active" type="button" onclick="view.setInspectorTab('summary')"></button>
                            <button id="inspectorTabStory" class="button readingSubTab" type="button" onclick="view.setInspectorTab('story')"></button>
                            <button id="inspectorTabNumbers" class="button readingSubTab" type="button" onclick="view.setInspectorTab('numbers')"></button>
                        </div>
                        <div id="inspectorSummaryPane" class="readingSubPane"></div>
                        <div id="inspectorStoryPane" class="readingSubPane hidden"></div>
                        <div id="inspectorNumbersPane" class="readingSubPane hidden"></div>

                </section>
                <section id="chroniclePane" class="readingPane hidden">
                    <div id="chronicleTabs" class="readingSubTabs" role="tablist" aria-label="Chronicle Tabs">

                <div id="statViewSelector" class="block">
